apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: opencode-scale

resources:
  # Sandbox
  - sandbox/sandbox-template.yaml
  - sandbox/sandbox-warmpool.yaml
  - sandbox/networkpolicy.yaml
  # Temporal
  - temporal/temporal-namespace.yaml
  - temporal/temporal-server.yaml
  # LiteLLM
  - litellm/config.yaml
  - litellm/deployment.yaml
  # Kong
  - kong/kong-ingress.yaml
  - kong/plugins/rate-limiting.yaml
  - kong/plugins/key-auth.yaml
  - kong/plugins/prometheus.yaml
  # Observability
  - otel/collector.yaml
  - otel/prometheus.yaml
  - otel/grafana/deployment.yaml
  # OpenCode Scale
  - opencode-scale/controller.yaml
  - opencode-scale/router.yaml
  - opencode-scale/worker.yaml

commonLabels:
  app.kubernetes.io/part-of: opencode-scale
