apiVersion: v1
kind: ConfigMap
metadata:
  name: temporal-archival-config
  labels:
    app.kubernetes.io/part-of: opencode-scale
    app.kubernetes.io/component: temporal-archival
data:
  config_template.yaml: |
    log:
      stdout: true
      level: info

    persistence:
      defaultStore: default
      visibilityStore: visibility
      numHistoryShards: 4
      datastores:
        default:
          sql:
            pluginName: "postgres12"
            databaseName: "temporal"
            connectAddr: "{{ default .Env.POSTGRES_SEEDS "postgresql" }}:{{ default .Env.DB_PORT "5432" }}"
            connectProtocol: "tcp"
            user: "{{ default .Env.POSTGRES_USER "temporal" }}"
            password: "{{ default .Env.POSTGRES_PWD "temporal" }}"
            maxConns: 20
            maxIdleConns: 20
            maxConnLifetime: "1h"
        visibility:
          sql:
            pluginName: "postgres12"
            databaseName: "temporal_visibility"
            connectAddr: "{{ default .Env.POSTGRES_SEEDS "postgresql" }}:{{ default .Env.DB_PORT "5432" }}"
            connectProtocol: "tcp"
            user: "{{ default .Env.POSTGRES_USER "temporal" }}"
            password: "{{ default .Env.POSTGRES_PWD "temporal" }}"
            maxConns: 10
            maxIdleConns: 10
            maxConnLifetime: "1h"

    global:
      membership:
        maxJoinDuration: 30s
      pprof:
        port: 7936
      archival:
        history:
          state: "enabled"
          enableRead: true
          provider:
            s3store:
              region: "us-east-1"
              endpoint: "http://minio:9000"
              s3ForcePathStyle: true
        visibility:
          state: "enabled"
          enableRead: true
          provider:
            s3store:
              region: "us-east-1"
              endpoint: "http://minio:9000"
              s3ForcePathStyle: true

    namespaceDefaults:
      archival:
        history:
          state: "enabled"
          URI: "s3://temporal-archival/history"
        visibility:
          state: "enabled"
          URI: "s3://temporal-archival/visibility"

    services:
      frontend:
        rpc:
          grpcPort: 7233
          membershipPort: 6933
          bindOnLocalHost: false
          bindOnIP: "0.0.0.0"
      matching:
        rpc:
          grpcPort: 7235
          membershipPort: 6935
          bindOnLocalHost: false
          bindOnIP: "0.0.0.0"
      history:
        rpc:
          grpcPort: 7234
          membershipPort: 6934
          bindOnLocalHost: false
          bindOnIP: "0.0.0.0"
      worker:
        rpc:
          grpcPort: 7239
          membershipPort: 6939
          bindOnLocalHost: false
          bindOnIP: "0.0.0.0"

    clusterMetadata:
      enableGlobalNamespace: false
      failoverVersionIncrement: 10
      masterClusterName: "active"
      currentClusterName: "active"
      clusterInformation:
        active:
          enabled: true
          initialFailoverVersion: 1
          rpcName: "frontend"
          rpcAddress: "localhost:7233"

    dcRedirectionPolicy:
      policy: "noop"
