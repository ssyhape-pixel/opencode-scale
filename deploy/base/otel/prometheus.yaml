apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.54.1
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=15d"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: "otel-collector"
        static_configs:
          - targets: ["otel-collector:8889"]

      - job_name: "opencode-scale-router"
        static_configs:
          - targets: ["opencode-scale-router:9090"]

      - job_name: "opencode-scale-controller"
        static_configs:
          - targets: ["opencode-scale-controller:9090"]

      - job_name: "opencode-scale-worker"
        static_configs:
          - targets: ["opencode-scale-worker:9090"]

      - job_name: "litellm"
        static_configs:
          - targets: ["litellm:4000"]
        metrics_path: /metrics

      - job_name: "kong"
        static_configs:
          - targets: ["kong-admin:8001"]
        metrics_path: /metrics
