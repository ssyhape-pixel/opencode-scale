apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: opencode-scale

patches:
  # Scale up for production
  - target:
      kind: Deployment
      name: opencode-scale-router
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: opencode-scale-worker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 5
  - target:
      kind: SandboxWarmPool
      name: opencode-pool
    patch: |
      - op: replace
        path: /spec/minReady
        value: 10
      - op: replace
        path: /spec/maxSize
        value: 200
  # Production resource limits
  - target:
      kind: Deployment
      name: opencode-scale-router
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: "500m"
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: "2"
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "2Gi"
