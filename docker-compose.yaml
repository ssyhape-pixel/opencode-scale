services:
  postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 3s
      timeout: 3s
      retries: 10

  temporal:
    image: temporalio/auto-setup:latest
    ports:
      - "7233:7233"
    volumes:
      - ./hack/temporal-config-template.yaml:/etc/temporal/config/config_template.yaml:ro
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
      - ARCHIVAL_ENABLED=${ARCHIVAL_ENABLED:-false}
      - ARCHIVAL_S3_REGION=${ARCHIVAL_S3_REGION:-us-east-1}
      - ARCHIVAL_S3_ENDPOINT=${ARCHIVAL_S3_ENDPOINT:-http://minio:9000}
      - ARCHIVAL_S3_BUCKET=${ARCHIVAL_S3_BUCKET:-temporal-archival}
      - ARCHIVAL_S3_FORCE_PATH_STYLE=${ARCHIVAL_S3_FORCE_PATH_STYLE:-true}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-minioadmin}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-minioadmin}
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "tctl --address $(hostname -i):7233 cluster health"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  temporal-ui:
    image: temporalio/ui:latest
    ports:
      - "8233:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8233
    depends_on:
      temporal:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    profiles: [archival]
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio-init:
    image: minio/mc:latest
    profiles: [archival]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        mc alias set myminio http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing myminio/temporal-archival &&
        echo 'Bucket ready.'
    restart: "no"

  mock-opencode:
    build:
      context: .
      target: mock-opencode
    command: ["-delay", "${MOCK_DELAY:-0s}", "-jitter", "${MOCK_JITTER:-0s}", "-chunk-delay", "${MOCK_CHUNK_DELAY:-0s}"]
    ports:
      - "4096:4096"

  router:
    build:
      context: .
      target: router
    ports:
      - "8080:8080"
      - "9090:9090"
    command: ["-config", "/etc/opencode-scale/config.yaml"]
    volumes:
      - ./hack/config-local.yaml:/etc/opencode-scale/config.yaml:ro
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_HOST_PORT=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - MOCK_OPENCODE_TARGET=mock-opencode:4096
      - POOL_MODE=local

  worker:
    build:
      context: .
      target: worker
    command: ["-config", "/etc/opencode-scale/config.yaml"]
    volumes:
      - ./hack/config-local.yaml:/etc/opencode-scale/config.yaml:ro
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_HOST_PORT=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - MOCK_OPENCODE_TARGET=mock-opencode:4096
      - POOL_MODE=local

volumes:
  minio-data:
