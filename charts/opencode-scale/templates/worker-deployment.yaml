apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opencode-scale.fullname" . }}-worker
  labels:
    {{- include "opencode-scale.componentLabels" (dict "root" . "component" "worker") | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "opencode-scale.componentSelectorLabels" (dict "root" . "component" "worker") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with (merge (.Values.worker.podAnnotations | default dict) (.Values.podAnnotations | default dict)) }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "opencode-scale.componentLabels" (dict "root" . "component" "worker") | nindent 8 }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "opencode-scale.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: {{ include "opencode-scale.image" (dict "imageValues" .Values.worker.image "chart" .Chart) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["/worker"]
          args:
            - "--config=/etc/opencode-scale/config.yaml"
          env:
            - name: POOL_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- with .Values.worker.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.config.telemetry.prometheusPort }}
              protocol: TCP
          {{- with .Values.worker.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.worker.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.worker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/opencode-scale
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "opencode-scale.configmapName" . }}
      {{- with (.Values.worker.nodeSelector | default .Values.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.worker.affinity | default .Values.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.worker.tolerations | default .Values.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- if .Values.worker.service.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opencode-scale.fullname" . }}-worker
  labels:
    {{- include "opencode-scale.componentLabels" (dict "root" . "component" "worker") | nindent 4 }}
  {{- with .Values.worker.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    {{- include "opencode-scale.componentSelectorLabels" (dict "root" . "component" "worker") | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.worker.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
{{- end }}
