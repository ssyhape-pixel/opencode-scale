apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opencode-scale.fullname" . }}-router
  labels:
    {{- include "opencode-scale.componentLabels" (dict "root" . "component" "router") | nindent 4 }}
spec:
  replicas: {{ .Values.router.replicaCount }}
  selector:
    matchLabels:
      {{- include "opencode-scale.componentSelectorLabels" (dict "root" . "component" "router") | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with (merge (.Values.router.podAnnotations | default dict) (.Values.podAnnotations | default dict)) }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "opencode-scale.componentLabels" (dict "root" . "component" "router") | nindent 8 }}
    spec:
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "opencode-scale.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: router
          image: {{ include "opencode-scale.image" (dict "imageValues" .Values.router.image "chart" .Chart) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          command: ["/router"]
          args:
            - "--config=/etc/opencode-scale/config.yaml"
          env:
            - name: POOL_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.litellmApiKeySecret }}
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.litellmApiKeySecret }}
                  key: api-key
            {{- end }}
            {{- with .Values.router.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.config.telemetry.prometheusPort }}
              protocol: TCP
          {{- with .Values.router.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.router.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.router.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/opencode-scale
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "opencode-scale.configmapName" . }}
      {{- with (.Values.router.nodeSelector | default .Values.nodeSelector) }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.router.affinity | default .Values.affinity) }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with (.Values.router.tolerations | default .Values.tolerations) }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opencode-scale.fullname" . }}-router
  labels:
    {{- include "opencode-scale.componentLabels" (dict "root" . "component" "router") | nindent 4 }}
  {{- with .Values.router.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.router.service.type }}
  selector:
    {{- include "opencode-scale.componentSelectorLabels" (dict "root" . "component" "router") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.router.service.httpPort }}
      targetPort: http
      protocol: TCP
    - name: metrics
      port: {{ .Values.router.service.metricsPort }}
      targetPort: metrics
      protocol: TCP
